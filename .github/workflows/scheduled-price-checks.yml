name: Scheduled Price Checks

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run scheduled checks
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PLAYWRIGHT_FALLBACK: "1"
          PLAYWRIGHT_TIMEOUT_MS: "25000"
          PLAYWRIGHT_RENDER_WAIT_MS: "1200"
          PLAYWRIGHT_NETWORK_IDLE_WAIT_MS: "3500"
          CHECK_BATCH_SIZE: "10"
        run: node scripts/run-scheduled-checks.mjs
